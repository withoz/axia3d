<!doctype html><html lang="ko"><head><meta charset="utf-8">
<title>참조 아이콘 세트 (WIP)</title>
<style>
  :root{ --bg:#0e141b; --ink:#e6edf4; --sub:#8595a5; --line:#26333f; }
  body{ margin:0; background:var(--bg); color:var(--ink); font-family:system-ui,-apple-system,"Segoe UI",sans-serif; }
  .wrap{ max-width:940px; margin:0 auto; padding:26px 18px 70px; }
  h1{ font-size:20px; margin:0 0 4px; }
  p.lead{ color:var(--sub); font-size:13px; margin:0 0 6px; }
  .warn{ background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.4); border-radius:8px; padding:9px 12px; font-size:12.5px; margin:12px 0 18px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:12px; }
  .cell{ margin:0; text-align:center; }
  .chip{ width:100%; aspect-ratio:1; border-radius:11px; background:#14161c; border:1px solid var(--line); display:grid; place-items:center; color:#e8e8e8; }
  .chip svg{ width:40px; height:40px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .chip svg .filled{ fill:currentColor; stroke:none; }
  .chip svg .accent{ stroke:#ef4444; }
  .chip svg .accent-fill{ fill:#ef4444; stroke:none; }
  .chip svg .hatch{ stroke:#22c55e; }
  figcaption{ font-size:11px; margin-top:6px; line-height:1.35; }
  figcaption b{ display:block; }
  figcaption .fn{ display:block; color:var(--sub); font:10px ui-monospace,monospace; margin-top:1px; }
  figcaption .nt{ display:block; color:var(--sub); font-size:10px; margin-top:1px; }
</style></head><body><div class="wrap">
<h1>참조 아이콘 세트 (WIP)</h1>
<p class="lead">사용자 참조 이미지의 모양들을 우리 SVG 스타일로 재현 (19종). 빨강=강조, 초록=해치.</p>
<div class="warn">⚠️ 참조 이미지가 저해상도라 <b>제 해석</b>이 들어갔습니다. 틀린 모양/이름은 알려주시면 고칩니다. <b>엔진 미적용</b> — 드래프트 보관용.</div>
<div class="grid"><figure class="cell"><div class="chip"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16"/><rect x="8.5" y="8.5" width="7" height="7"/><path class="accent" d="M4 7.5 L4 4 L7.5 4 M16.5 4 L20 4 L20 7.5 M4 16.5 L4 20 L7.5 20 M16.5 20 L20 20 L20 16.5"/></svg></div><figcaption><b>영역/사각형 (region)</b><span class="fn">region-nested.svg</span><span class="nt">square in square + 빨강 코너</span></figcaption></figure>
<figure class="cell"><div class="chip"><svg viewBox="0 0 24 24"><path d="M4 12 L20 12"/><circle cx="4" cy="12" r="1.3" class="filled"/><circle cx="20" cy="12" r="1.3" class="filled"/></svg></div><figcaption><b>선 (line)</b><span class="fn">line.svg</span><span class="nt">가로 선</span></figcaption></figure>
<figure class="cell"><div class="chip"><svg viewBox="0 0 24 24"><path d="M4 19 L4 5 L18 5"/></svg></div><figcaption><b>모서리/폴리라인 A</b><span class="fn">corner-open.svg</span><span class="nt">ㄴ자 열린 코너</span></figcaption></figure>
<figure class="cell"><div class="chip"><svg viewBox="0 0 24 24"><path d="M4 19 L4 5 L18 5 L18 11"/></svg></div><figcaption><b>폴리라인 B</b><span class="fn">polyline.svg</span><span class="nt">코너 + 짧은 변</span></figcaption></figure>
<figure class="cell"><div class="chip"><svg viewBox="0 0 24 24"><path d="M17 5 L6 5 L6 19 L17 19"/></svg></div><figcaption><b>채널/브래킷 ( [ )</b><span class="fn">channel.svg</span><span class="nt">오른쪽 열린 ㄷ</span></figcaption></figure>
<figure class="cell"><div class="chip"><svg viewBox="0 0 24 24"><path d="M5 6 L5 11 A 7 7 0 0 0 19 11 L19 6"/></svg></div><figcaption><b>호/U 곡선</b><span class="fn">arc-u.svg</span><span class="nt">U 골 곡선</span></figcaption></figure>
<figure class="cell"><div class="chip"><svg viewBox="0 0 24 24"><path class="accent" d="M4 12 L20 12 M7.5 8.5 L4 12 L7.5 15.5 M16.5 8.5 L20 12 L16.5 15.5"/></svg></div><figcaption><b>양방향 화살 (빨강)</b><span class="fn">arrow-2way.svg</span><span class="nt">red ↔</span></figcaption></figure>
<figure class="cell"><div class="chip"><svg viewBox="0 0 24 24"><path d="M6 4 L6 18 L20 18"/><rect class="accent-fill" x="4.4" y="16.4" width="3.2" height="3.2"/></svg></div><figcaption><b>직각 코너 + 빨강 점</b><span class="fn">corner-mark.svg</span><span class="nt">ㄴ + 빨강 사각</span></figcaption></figure>
<figure class="cell"><div class="chip"><svg viewBox="0 0 24 24"><path d="M6 3 L6 10"/><path class="accent" d="M6 10 A 8 8 0 0 0 14 18"/><path d="M14 18 L21 18"/></svg></div><figcaption><b>필렛(둥근 모서리)</b><span class="fn">fillet.svg</span><span class="nt">빨강 곡선 코너</span></figcaption></figure>
<figure class="cell"><div class="chip"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3.8"/></svg></div><figcaption><b>링/동심원</b><span class="fn">ring.svg</span><span class="nt">concentric</span></figcaption></figure>
<figure class="cell"><div class="chip"><svg viewBox="0 0 24 24"><path d="M12 3 L21 12 L12 21 L3 12 Z"/><path d="M12 8 L16 12 L12 16 L8 12 Z"/></svg></div><figcaption><b>다이아 중첩</b><span class="fn">diamond-nested.svg</span><span class="nt">nested diamond</span></figcaption></figure>
<figure class="cell"><div class="chip"><svg viewBox="0 0 24 24"><path d="M5 5 L5 19 L19 19"/><path class="accent" d="M19 19 L5 5"/></svg></div><figcaption><b>삼각형 (빗변 빨강)</b><span class="fn">triangle.svg</span><span class="nt">직각삼각형</span></figcaption></figure>
<figure class="cell"><div class="chip"><svg viewBox="0 0 24 24"><path d="M4 20 L4 10 L12 4 L20 10 L20 20 Z"/></svg></div><figcaption><b>경계 폴리곤</b><span class="fn">boundary-poly.svg</span><span class="nt">집/펜타곤</span></figcaption></figure>
<figure class="cell"><div class="chip"><svg viewBox="0 0 24 24"><rect x="5" y="6" width="14" height="12"/><path class="accent" d="M3 18 L7 18 M5 16 L5 20"/></svg></div><figcaption><b>사각형+기준점(빨강)</b><span class="fn">rect-basepoint.svg</span><span class="nt">red base corner</span></figcaption></figure>
<figure class="cell"><div class="chip"><svg viewBox="0 0 24 24"><path d="M5 19 L19 19 L19 5 Z"/></svg></div><figcaption><b>삼각형 B</b><span class="fn">triangle-diag.svg</span><span class="nt">대각 삼각형</span></figcaption></figure>
<figure class="cell"><div class="chip"><svg viewBox="0 0 24 24"><path d="M4 18 L7 7 L19 5 L20 16 Z"/></svg></div><figcaption><b>사변형/트래피조이드</b><span class="fn">quad.svg</span><span class="nt">irregular quad</span></figcaption></figure>
<figure class="cell"><div class="chip"><svg viewBox="0 0 24 24"><path d="M12 3 Q 18 12 12 21 Q 6 12 12 3 Z"/></svg></div><figcaption><b>렌즈/뾰족 타원</b><span class="fn">lens.svg</span><span class="nt">vesica</span></figcaption></figure>
<figure class="cell"><div class="chip"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4.3"/><circle cx="12" cy="16" r="5.3"/></svg></div><figcaption><b>8 (이중 루프)</b><span class="fn">eight.svg</span><span class="nt">double circle</span></figcaption></figure>
<figure class="cell"><div class="chip"><svg viewBox="0 0 24 24"><rect class="hatch" x="4" y="4" width="16" height="16"/><path class="hatch" d="M4 12 L12 4 M4 20 L20 4 M12 20 L20 12 M4 8 L8 4 M16 20 L20 16"/></svg></div><figcaption><b>해치(초록)</b><span class="fn">hatch-green.svg</span><span class="nt">green hatch fill</span></figcaption></figure>
</div>
</div></body></html>
