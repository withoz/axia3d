name: Release (ADR-044)

# Triggered by push of `release/v*` tags OR manual workflow_dispatch.
#   - tag push        → preflight ONLY (build + schema-pin + tests). No publish.
#   - workflow_dispatch with publish=true → preflight + publish.
# Publishes:
#   - axia-wasm           (wasm-pack-generated, scoped)
#   - @axia/mcp-server
#   - create-axia-mcp
#
# All three publishes use --provenance (npm supply-chain attestation,
# requires GitHub Actions OIDC `id-token: write`).
#
# Pre-flight: verify-schema-pin.mjs guarantees lockstep semver and
# schema_version compatibility (ADR-044 P29.2).
#
# IMPORTANT: This workflow is wired but `npm publish` is GATED by
# the "publish" input (default: false). A real release requires
# explicit input + a valid `NPM_TOKEN` secret in repo settings.

on:
  push:
    tags:
      - 'release/v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to npm? (false = dry-run only)'
        required: true
        default: 'false'
        # MUST stay `choice` (a choice input resolves to a STRING). The publish
        # job's gate compares `inputs.publish == 'true'`. If this were changed
        # to `type: boolean`, the `inputs` context would preserve a real Boolean
        # (unlike `github.event.inputs`, which stringifies), so the comparison
        # would be boolean-vs-string → always false → publish unreachable
        # forever. Fails closed, but silently.
        type: choice
        options:
          - 'false'
          - 'true'

# OIDC token for npm provenance attestation.
permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight — schema-pin + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          if ! command -v wasm-pack &>/dev/null; then
            cargo install wasm-pack --version 0.14.0
          fi

      - name: Build axia-wasm (Node target)
        working-directory: ./crates/axia-wasm
        run: wasm-pack build --target nodejs --out-dir ../../packages/axia-wasm-node/dist

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install — axia-mcp-server
        working-directory: packages/axia-mcp-server
        run: npm ci

      - name: Install — create-axia-mcp
        working-directory: packages/create-axia-mcp
        run: npm ci

      - name: Schema-pin verification (ADR-044 P29.2)
        run: node packages/axia-mcp-server/scripts/verify-schema-pin.mjs

      - name: Tests — axia-mcp-server
        working-directory: packages/axia-mcp-server
        run: npm test

      - name: Tests — create-axia-mcp
        working-directory: packages/create-axia-mcp
        run: npm test

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: preflight
    # ADR-044 P29.6 — publish is FAIL-SAFE: it requires an EXPLICIT
    # workflow_dispatch with publish=true. Pushing a `release/v*` tag runs
    # preflight (build + schema-pin + tests) but does NOT publish.
    #
    # 2026-07-14 (pre-push audit): this previously read
    #   `github.event_name == 'push' || (workflow_dispatch && publish == 'true')`
    # whose leading `push` clause auto-published on ANY release/v* tag,
    # bypassing the input entirely — contradicting this file's own header
    # ("npm publish is GATED by the publish input (default: false). A real
    # release requires explicit input"). Harmless only while NPM_TOKEN is
    # absent (npm publish → ENEEDAUTH); the moment a token is added, one tag
    # push would have published all three packages to the public registry.
    # On a tag push `github.event_name` is 'push', so the FIRST conjunct is
    # false and the job is skipped (skipped ≠ failed — the run still concludes
    # green, and `preflight` has no `if:` so it always runs). Belt-and-braces:
    # on a push the `inputs` context isn't populated and `inputs.publish`
    # dereferences to an empty string, and '' == 'true' is false — no coercion
    # path in GitHub's expression language reaches true.
    if: github.event_name == 'workflow_dispatch' && inputs.publish == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: |
          if ! command -v wasm-pack &>/dev/null; then
            cargo install wasm-pack --version 0.14.0
          fi

      - name: Build axia-wasm (Node target)
        working-directory: ./crates/axia-wasm
        run: wasm-pack build --target nodejs --out-dir ../../packages/axia-wasm-node/dist

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install — axia-mcp-server
        working-directory: packages/axia-mcp-server
        run: npm ci

      - name: Install — create-axia-mcp
        working-directory: packages/create-axia-mcp
        run: npm ci

      - name: Build — axia-mcp-server
        working-directory: packages/axia-mcp-server
        run: npm run build

      - name: Build — create-axia-mcp
        working-directory: packages/create-axia-mcp
        run: npm run build

      # ADR-044 P29.3 — `--access public` required for scoped packages.
      # P29.6 — provenance via `id-token: write` permission above.
      - name: Publish — axia-wasm-node
        working-directory: packages/axia-wasm-node/dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Publish — @axia/mcp-server
        working-directory: packages/axia-mcp-server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Publish — create-axia-mcp
        working-directory: packages/create-axia-mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
