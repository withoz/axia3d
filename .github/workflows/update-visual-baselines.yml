# ADR-077 V-3 (multi-OS baseline) — Manual Linux baseline generator.
#
# Purpose: produce `*-chromium-linux.png` baselines for the visual
# regression specs so they can be re-enabled (currently `test.describe.skip`
# in web/e2e/visual/group-color.visual.spec.ts and smoke.visual.spec.ts).
#
# Trigger: `workflow_dispatch` only (manual run via GitHub UI).
#
# Output: artifact `visual-baselines-linux` containing all
# `*-snapshots/*-linux.png` files generated by Playwright's
# `--update-snapshots` flag. User downloads, unzips into the repo, and
# commits in a follow-up PR.
#
# Cross-link: ADR-077 V-1 lock-in #4 (Linux baseline missing on host-OS
# dev) — this workflow is the canonical Linux-baseline-generation path
# until V-3 multi-OS matrix lands.

name: Update Visual Baselines (Linux)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to generate baselines from'
        required: false
        default: 'main'

concurrency:
  group: update-visual-baselines-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate Linux baselines (Playwright --update-snapshots)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build (shared with ci.yml WASM)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-wasm
          workspaces: crates/axia-wasm

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          # ADR-265 (8513ec3) moved web/package-lock.json → root package-lock.json
          # (npm workspaces). ADR-266 (239112e) realigned build.yml + ci.yml but
          # missed this workflow, so setup-node hard-threw before this generator
          # could ever run — which mattered: this IS the designated tool to
          # refresh the stale *-chromium-linux.png baselines that fail
          # ci.yml/web-e2e, so the fix for that failure was itself blocked.
          cache-dependency-path: 'package-lock.json'

      - name: npm ci (web)
        working-directory: ./web
        run: npm ci

      - name: Build WASM (release)
        working-directory: ./crates/axia-wasm
        run: wasm-pack build --target web --out-dir ../../web/src/wasm

      - name: Build dist (vite + tsc)
        working-directory: ./web
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: ./web
        run: npx playwright install --with-deps chromium

      # Visual specs are ACTIVE — no un-skip needed.
      #
      # This step used to `sed -i "s/test\.describe\.skip(/test.describe(/g"`
      # the specs in place, back when they shipped as `test.describe.skip`
      # "until baselines are committed". They were un-skipped once baselines
      # landed (155e127), so the sed became a silent no-op: as of 2026-07-14
      # an unanchored grep for `test.describe.skip(` across
      # e2e/visual/*.visual.spec.ts matches 0 occurrences in code (only stale
      # doc-comments mention it). Removed rather than left in place, because a
      # no-op that claims to guarantee something is worse than no step at all —
      # it implies the specs might be skipped when they never are.
      #
      # The spec-discovery + listing is kept: the glob catches specs added
      # later (a previous version hard-coded two filenames and silently
      # produced 0 baselines for the cylinder + edge-interaction specs —
      # fixed 2026-05-14), and the listing makes the run auditable.
      - name: List visual specs (auditability)
        working-directory: ./web
        run: |
          shopt -s nullglob
          specs=(e2e/visual/*.visual.spec.ts)
          if [ ${#specs[@]} -eq 0 ]; then
            echo "::warning::No visual specs found at e2e/visual/*.visual.spec.ts"
            exit 0
          fi
          echo "Found ${#specs[@]} visual spec(s):"
          for f in "${specs[@]}"; do echo "  - $f"; done
          echo ""
          echo "--- describe blocks (must NOT be .skip) ---"
          for f in "${specs[@]}"; do
            echo "[$f]"
            grep -n "test\.describe" "$f" || true
          done
          if grep -q "test\.describe\.skip(" "${specs[@]}"; then
            echo "::error::A visual spec is test.describe.skip — --update-snapshots would produce no baseline for it."
            exit 1
          fi

      # First pass generates baselines (exits 0 even if no prior baseline).
      - name: Generate baselines (playwright test --update-snapshots)
        working-directory: ./web
        run: npx playwright test e2e/visual --update-snapshots

      - name: List generated baselines
        working-directory: ./web
        run: |
          echo "--- generated snapshot files ---"
          find e2e/visual -name "*.png" -type f | sort

      - name: Upload Linux baselines as artifact
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines-linux
          path: web/e2e/visual/**/*-snapshots/*-linux.png
          if-no-files-found: error
          retention-days: 14

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-baseline-gen
          path: web/playwright-report/
          retention-days: 14
