name: Build AXiA 3D

on:
  push:
    # 2026-04-23: claude/** 와 feature/** 를 추가해 피처 브랜치에서도 typecheck
    # 돌게 함. 이전엔 main/develop 에서만 돌아 claude/zealous-boyd에 TS 에러
    # 17개가 누적된 뒤 merge 직전에야 발견됨.
    branches: [ main, develop, 'claude/**', 'feature/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked

      - name: Build WASM
        working-directory: ./crates/axia-wasm
        run: wasm-pack build --target web --out-dir ../../web/src/wasm

      # ADR-265 Phase 0.1 — npm workspace 루트. lock/install은 루트에서.
      - name: Install dependencies (npm workspace root)
        run: npm ci

      - name: Run TypeScript typecheck (strict)
        working-directory: ./web
        # 2026-04-23: npm run typecheck 사용 (tsconfig strict:true 유지).
        # tsc 에러 발생 시 build 실패 → main merge 불가.
        run: npm run typecheck

      - name: Build with Vite
        working-directory: ./web
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.node-version }}
          path: web/dist/
          retention-days: 30

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── 2026-05-14 (LOCKED #40 follow-up, PRs #18/#19/#20) ─────────
      # The `web/src/wasm/axia_wasm.{js,d.ts}` wasm-pack outputs are no
      # longer tracked in git (PR #18). `WasmBridge.ts` imports from
      # `../wasm/axia_wasm`, and Vite's import-analysis fails to
      # resolve the relative path at test-transform time even when
      # `vi.mock(...)` would replace the module at runtime — relative
      # specifiers bypass alias resolution entirely.
      #
      # Earlier attempt (PR #19) committed a `.ts` stub at the resolved
      # path. That fixed the test job but broke `tsc --noEmit` in the
      # build job: TypeScript prefers `.ts` over `.d.ts`, so the stub's
      # incomplete surface displaced the real generated types. The stub
      # was reverted.
      #
      # The principled fix is to give the test job the same Rust
      # toolchain as the build/ci jobs. wasm-pack output is then
      # produced from source the same way it is everywhere else, so
      # `WasmBridge.ts` resolves correctly and `vi.mock(...)` works as
      # intended.
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build (shared with build job)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-wasm
          workspaces: crates/axia-wasm

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      # Build WASM from source BEFORE `npm ci` so the postinstall hook
      # (ensure-wasm.mjs) sees an existing artifact and exits silently.
      - name: Build WASM (release)
        working-directory: ./crates/axia-wasm
        run: wasm-pack build --target web --out-dir ../../web/src/wasm

      # ADR-265 Phase 0.1 — npm workspace 루트. lock/install은 루트에서.
      - name: Install dependencies (npm workspace root)
        run: npm ci

      - name: Run tests
        working-directory: ./web
        # 2026-04-23: `|| echo skipped` 제거 — 테스트 실패가 CI 실패로 이어지게.
        run: npm run test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: web/coverage/
          retention-days: 7
