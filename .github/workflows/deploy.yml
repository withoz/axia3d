name: Deploy to GitHub Pages

# AUTO-DEPLOY DISABLED (사용자 결재 2026-07-14).
#
# The `push: branches: [main]` trigger is removed, so this no longer fires on
# every push — only a deliberate `workflow_dispatch` runs it. The workflow
# itself is kept intact and ready.
#
# Why: on the first push to withoz/axia3d this failed at `actions/configure-
# pages@v4` with "Get Pages site failed. Please verify that the repository has
# Pages enabled and configured to build using GitHub Actions" / HttpError: Not
# Found — Pages has never been configured for this repo. It would have gone red
# on every single main push, training everyone to ignore CI failures.
#
# To re-enable: configure Settings → Pages → Source: GitHub Actions, run this
# once via workflow_dispatch to confirm it deploys, then restore the trigger:
#   on:
#     push:
#       branches: [ main ]
#     workflow_dispatch:
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          # ADR-265 (8513ec3) moved web/package-lock.json → root package-lock.json
          # (npm workspaces). ADR-266 (239112e) realigned build.yml + ci.yml but
          # missed this workflow, so setup-node hard-threw "Some specified paths
          # were not resolved, unable to cache dependencies" on any push to main.
          cache-dependency-path: 'package-lock.json'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked

      - name: Build WASM
        working-directory: ./crates/axia-wasm
        run: wasm-pack build --target web --out-dir ../../web/src/wasm

      - name: Install dependencies
        working-directory: ./web
        run: npm ci

      - name: Build
        working-directory: ./web
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'web/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
